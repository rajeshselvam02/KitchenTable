version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: devpw
      POSTGRES_DB: propagent_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dev_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "node /app/backend/dist/index.js"
    environment:
      DATABASE_URL: postgres://dev_user:devpw@postgres:5432/propagent_dev
      JWT_SECRET: kitchen-table-secret
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm start"
    environment:
      NEXTAUTH_SECRET: kitchen-table-secret
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
    driver: local
